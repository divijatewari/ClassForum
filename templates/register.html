{% extends "layout.html" %}

{% block content %}

<div style="
display:flex;
justify-content:center;
align-items:center;
min-height:80vh;
">

<div class="card" style="
width:420px;
padding:35px;
border-radius:20px;
background: rgba(255,255,255,0.05);
backdrop-filter: blur(12px);
box-shadow: 0 8px 30px rgba(0,0,0,0.3);
">

<h2 style="
text-align:center;
font-size:24px;
font-weight:bold;
margin-bottom:25px;
">
📝 Register
</h2>

<form method="POST" style="display:flex; flex-direction:column; gap:15px;">

<input name="username" placeholder="Username" class="input">

<input name="password" type="password" placeholder="Password" class="input">

<select name="role" class="input">
<option value="student">Student</option>
<option value="teacher">Teacher</option>
</select>

<!-- SUBJECT SELECT -->
<select name="subject_id" class="input">
<option value="">Select Subject (only for teacher)</option>

{% for s in subjects %}
<option value="{{s.id}}">{{s.name}}</option>
{% endfor %}

</select>

<button class="btn" style="
margin-top:10px;
padding:10px;
border-radius:10px;
font-weight:600;
">
Register
</button>

</form>

</div>
</div>

{% endblock %}
