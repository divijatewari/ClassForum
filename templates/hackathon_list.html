{% extends "layout.html" %}

{% block content %}

<div class="max-w-2xl mx-auto mt-10">

    <h2 class="text-3xl font-bold mb-6 text-white">
        🚀 Hackathon Attendance
    </h2>

    <form method="POST" enctype="multipart/form-data" class="space-y-5">

        <!-- Hackathon Name -->
        <input
            name="name"
            placeholder="Hackathon Name"
            required
            class="w-full px-4 py-3 rounded-lg bg-white/10 text-white border border-white/20 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        >

        <!-- Date -->
        <input
            type="date"
            name="date"
            required
            class="w-full px-4 py-3 rounded-lg bg-white/10 text-white border border-white/20 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        >

        <!-- Time -->
        <input
            type="time"
            name="time"
            required
            class="w-full px-4 py-3 rounded-lg bg-white/10 text-white border border-white/20 focus:outline-none focus:ring-2 focus:ring-indigo-500"
        >

        <!-- File Upload -->
        <input
            type="file"
            name="proof"
            required
            class="w-full px-4 py-3 rounded-lg bg-white/10 text-white border border-white/20 file:bg-indigo-600 file:text-white file:px-4 file:py-2 file:border-0 file:rounded-md"
        >

        <!-- Submit Button -->
        <button
            class="w-full py-3 rounded-lg bg-gradient-to-r from-indigo-500 to-purple-600 text-white font-semibold hover:scale-105 transition"
        >
            Submit Attendance
        </button>

    </form>

</div>

{% endblock %}
